# ==============================================================
# AETHEROS — BUILD YOUR OWN OPERATING SYSTEM FROM SCRATCH
# GRUB Bootloader Configuration (AetherOS-64)
# ==============================================================

# Load video drivers — needed so GRUB can hand a VESA framebuffer to the kernel
insmod all_video
insmod video_bochs
insmod video_cirrus
insmod vbe

# Stay in plain text console mode for the menu (avoids font/gfxterm issues)
# gfxpayload=keep tells GRUB to preserve the video mode when handing off to kernel
set timeout=5
set default=0
set gfxmode=1024x768x32
set gfxpayload=keep

menuentry "AetherOS" {
    multiboot2 /boot/aetheros.bin
    boot
}

menuentry "AetherOS (Safe / Text Mode)" {
    set gfxpayload=text
    multiboot2 /boot/aetheros.bin
    boot
}

